{% extends "base.html" %}
{% block content %}
<section class="page-head"><div><p class="eyebrow">Tracking</p><h1>Add Expense</h1></div><a class="btn btn-outline-primary" href="{{ url_for('main.scanner') }}">Scan Receipt</a></section>
<section class="two-col">
  <form class="glass-panel stack-form" method="post">
    <h2>Manual Entry</h2>
    <label>Amount<input class="form-control" type="number" step="0.01" name="amount" required></label>
    <label>Category<select class="form-select" name="category_id">{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></label>
    <label>Date<input class="form-control" type="date" name="expense_date" value="{{ today }}" required></label>
    <label>Merchant<input class="form-control" name="merchant"></label>
    <label>Description<input class="form-control" name="description" required></label>
    <button class="btn btn-primary">Save Expense</button>
  </form>
  <div class="glass-panel table-card">
    <h2>Latest Expenses</h2>
    <table class="table app-table"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="text-end">Amount</th></tr></thead><tbody>
    {% for row in expenses %}<tr><td>{{ row.expense_date }}</td><td>{{ row.description }}</td><td>{{ row.category.name }}</td><td class="text-end">{{ row.amount|round(2) }}</td></tr>{% endfor %}
    </tbody></table>
  </div>
</section>
{% endblock %}
