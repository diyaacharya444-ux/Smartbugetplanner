{% extends "base.html" %}
{% block content %}
<section class="page-head"><div><p class="eyebrow">{{ month }}</p><h1>Budget Rollover</h1></div></section>
<form class="glass-panel" method="post">
  <input type="hidden" name="month" value="{{ month }}">
  <div class="allocation-grid">
    {% for card in cards %}
    {% set saved = existing.get(card.row.category_id) %}
    <label class="allocation-edit">
      <span><i class="fa-solid {{ card.row.category.icon }}"></i> {{ card.row.category.name }}</span>
      <strong>Remaining {{ symbol }}{{ [card.remaining, 0]|max|round(2) }}</strong>
      <select class="form-select" name="pref_{{ card.row.category_id }}">
        <option value="carry_forward" {% if saved and saved.preference == 'carry_forward' %}selected{% endif %}>Carry forward to next month</option>
        <option value="transfer_savings" {% if saved and saved.preference == 'transfer_savings' %}selected{% endif %}>Transfer to savings</option>
        <option value="ignore" {% if saved and saved.preference == 'ignore' %}selected{% endif %}>Ignore rollover</option>
      </select>
    </label>
    {% endfor %}
  </div>
  <button class="btn btn-primary mt-3">Save Rollover Choices</button>
</form>
{% endblock %}
