{% extends "base.html" %}
{% block content %}
<section class="page-head"><div><p class="eyebrow">Ledger</p><h1>Transactions</h1></div><div class="button-row"><a class="btn btn-outline-primary" href="{{ url_for('main.export_transactions', fmt='csv') }}">Export CSV</a><a class="btn btn-outline-primary" href="{{ url_for('main.export_transactions', fmt='pdf') }}">Export PDF</a></div></section>
<section class="glass-panel">
  <form class="filter-bar">
    <input class="form-control" name="q" value="{{ q }}" placeholder="Search description or merchant">
    <select class="form-select" name="category_id"><option value="">All categories</option>{% for c in categories %}<option value="{{ c.id }}" {% if category_id and category_id|int == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select>
    <select class="form-select" name="sort"><option value="date_desc" {% if sort == 'date_desc' %}selected{% endif %}>Newest</option><option value="amount_desc" {% if sort == 'amount_desc' %}selected{% endif %}>Amount high</option><option value="amount_asc" {% if sort == 'amount_asc' %}selected{% endif %}>Amount low</option></select>
    <button class="btn btn-primary">Apply</button>
  </form>
  <div class="table-responsive">
    <table class="table app-table"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th class="text-end">Amount</th></tr></thead><tbody>
      {% for row in rows %}<tr><td>{{ row.expense_date }}</td><td>{{ row.description }}<small>{{ row.merchant }}</small></td><td>{{ row.category.name }}</td><td>Expense</td><td class="text-end">{{ row.amount|round(2) }}</td></tr>{% endfor %}
    </tbody></table>
  </div>
</section>
{% endblock %}
