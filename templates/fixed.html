{% extends "base.html" %}
{% block content %}
<section class="page-head"><div><p class="eyebrow">Recurring</p><h1>Fixed Categories</h1></div></section>
<section class="two-col">
  <form class="glass-panel stack-form" method="post">
    <h2>Add or Edit Fixed Expense</h2>
    <input type="hidden" name="fixed_id" id="fixedId">
    <label>Name<input class="form-control" name="name" id="fixedName" placeholder="Rent, EMI, Internet Bill" required></label>
    <label>Amount<input class="form-control" type="number" step="0.01" name="amount" id="fixedAmount" required></label>
    <label>Category<select class="form-select" name="category_id" id="fixedCategory">{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></label>
    <label>Due Day<input class="form-control" type="number" min="1" max="28" name="due_day" id="fixedDue" value="1"></label>
    <button class="btn btn-primary">Save Fixed Category</button>
  </form>
  <div class="glass-panel table-card">
    <h2>Fixed Expenses</h2>
    {% for row in rows %}
    <div class="list-row">
      <div><strong>{{ row.name }}</strong><small>{{ row.category.name }} · Day {{ row.due_day }}</small></div>
      <strong>{{ row.amount|round(2) }}</strong>
      <button class="icon-btn edit-fixed" data-id="{{ row.id }}" data-name="{{ row.name }}" data-amount="{{ row.amount }}" data-category="{{ row.category_id }}" data-due="{{ row.due_day }}"><i class="fa-solid fa-pen"></i></button>
      <form method="post" action="{{ url_for('main.delete_fixed', fixed_id=row.id) }}"><button class="icon-btn"><i class="fa-solid fa-trash"></i></button></form>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
