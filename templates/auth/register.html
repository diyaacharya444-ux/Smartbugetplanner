{% extends "base.html" %}
{% block title %}Register - Smart Budget Planner{% endblock %}
{% block content %}
<section class="auth-card glass-panel">
  <div>
    <p class="eyebrow">BudgetIQ</p>
    <h1>Create your planner</h1>
    <p class="muted">Build monthly allocations, scan receipts, set savings goals, and catch overspending early.</p>
  </div>
  <form method="post" class="stack-form">
    <label>Name<input class="form-control" name="name" required></label>
    <label>Email<input class="form-control" type="email" name="email" required></label>
    <label>Password<input class="form-control" type="password" name="password" minlength="6" required></label>
    <button class="btn btn-primary w-100">Register</button>
    <p class="small">Already registered? <a href="{{ url_for('auth.login') }}">Login</a></p>
  </form>
</section>
{% endblock %}
