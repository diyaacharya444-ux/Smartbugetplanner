{% extends "base.html" %}
{% block content %}
<section class="page-head"><div><p class="eyebrow">Income</p><h1>Monthly Salary</h1></div></section>
<section class="two-col">
  <form class="glass-panel stack-form" method="post">
    <h2>Add Salary</h2>
    <label>Monthly Salary<input class="form-control" type="number" step="0.01" name="amount" required></label>
    <label>Salary Date<input class="form-control" type="date" name="salary_date" value="{{ today }}" required></label>
    <label>Currency<select class="form-select" name="currency"><option value="INR">INR - ₹</option><option value="NPR">NPR - रू</option><option value="USD">USD - $</option><option value="EUR">EUR - €</option><option value="GBP">GBP - £</option></select></label>
    <button class="btn btn-primary">Save Salary</button>
  </form>
  <div class="glass-panel table-card">
    <h2>Salary History</h2>
    <table class="table app-table"><thead><tr><th>Date</th><th>Currency</th><th class="text-end">Amount</th></tr></thead><tbody>
    {% for row in salaries %}<tr><td>{{ row.salary_date }}</td><td>{{ row.currency }}</td><td class="text-end">{{ row.amount|round(2) }}</td></tr>{% endfor %}
    </tbody></table>
  </div>
</section>
{% endblock %}
